name: qualis-production

services:
  db:
    # UPGRADING FROM 16: PostgreSQL major versions cannot read each other's data
    # directory, and postgres:18 also relocated PGDATA. An existing deployment
    # must dump on 16 and restore on 18 — see the "Upgrading PostgreSQL" section
    # of docs/guides/deployment.md. Starting an 18 image against a 16 volume
    # fails to boot; it does not corrupt anything, but it will not start either.
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: qualis
      POSTGRES_USER: qualis
      POSTGRES_PASSWORD: ${QUALIS_DB_PASSWORD:?Set QUALIS_DB_PASSWORD in .env.production}
    volumes:
      # Mount point follows postgres:18's relocated VOLUME (see the dev compose
      # file for the full rationale). A 16-era volume holds its cluster at
      # /var/lib/postgresql/data and is NOT readable through this mount.
      - qualis-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualis -d qualis"]
      interval: 5s
      timeout: 3s
      retries: 12
      # Probe every second while starting so a restart is noticed promptly
      # (Docker Engine 25+; older daemons ignore the key). Durability settings
      # stay at the Postgres defaults here — unlike the dev Compose file.
      start_interval: 1s
      start_period: 30s
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://qualis:${QUALIS_DB_PASSWORD:?Set QUALIS_DB_PASSWORD in .env.production}@db:5432/qualis
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env.production}
      IP_HASH_SALT: ${IP_HASH_SALT:?Set IP_HASH_SALT in .env.production}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL in .env.production}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS in .env.production}
      ENVIRONMENT: production
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env.production}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env.production}
      # The backend is reachable only through the frontend nginx service on this
      # private Compose network, so its forwarded client headers are trusted.
      TRUSTED_PROXIES: "*"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          ".venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_interval: 1s
      start_period: 60s
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      QUALIS_ALLOWED_HOST_PATTERN: ${QUALIS_ALLOWED_HOST_PATTERN:?Set QUALIS_ALLOWED_HOST_PATTERN in .env.production}
    ports:
      # Bind locally; terminate public TLS with Caddy, Traefik, or nginx.
      - "127.0.0.1:${QUALIS_HTTP_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qualis-pgdata:
