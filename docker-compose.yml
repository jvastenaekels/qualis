services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qualis
      POSTGRES_USER: qualis
      POSTGRES_PASSWORD: qualis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualis"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://qualis:qualis@db:5432/qualis
      SECRET_KEY: docker-dev-secret-change-in-production
      IP_HASH_SALT: docker-dev-salt-change-in-production
      FRONTEND_URL: http://localhost:3000
      ENVIRONMENT: development
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
