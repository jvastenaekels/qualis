services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qualis
      POSTGRES_USER: qualis
      POSTGRES_PASSWORD: qualis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualis"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Object storage for audio responses. The default demo seeds spoken audio
  # comments, which need an S3-compatible store. MinIO is reached internally by
  # the backend at http://minio:9000 and served to the browser at
  # http://localhost:9000 (see S3_PUBLIC_ENDPOINT_URL on the backend).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qualis
      MINIO_ROOT_PASSWORD: qualis-demo-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12

  # One-shot: create the audio bucket, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set demo http://minio:9000 qualis qualis-demo-secret &&
      mc mb --ignore-existing demo/qualis-audio &&
      echo 'Bucket qualis-audio ready';
      "

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://qualis:qualis@db:5432/qualis
      SECRET_KEY: docker-dev-secret-change-in-production
      IP_HASH_SALT: docker-dev-salt-change-in-production
      FRONTEND_URL: http://localhost:3000
      ENVIRONMENT: development
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      # Audio storage (MinIO). Backend uploads via the internal endpoint;
      # presigned playback URLs are signed for the browser-facing endpoint.
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET_NAME: qualis-audio
      S3_ACCESS_KEY_ID: qualis
      S3_SECRET_ACCESS_KEY: qualis-demo-secret
      S3_REGION: us-east-1
      S3_ADDRESSING_STYLE: path
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      # On a cold first start the backend runs `uv sync` (dependency download)
      # and Alembic migrations before serving /health — this can exceed the
      # retry window (12 x 5s) on a fresh build. During start_period, failing
      # probes do NOT mark the container unhealthy, so `make demo-up` no longer
      # aborts the frontend on slow first boots. A probe that succeeds earlier
      # flips the container healthy immediately.
      start_period: 180s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
