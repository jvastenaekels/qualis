services:
  db:
    image: postgres:18-alpine
    # DEVELOPMENT ONLY — durability traded for speed. The 33 Alembic migrations
    # and the demo seed are dominated by fsync latency; this data is disposable
    # (`make demo-down` throws it away), so a crash losing it costs nothing.
    # NEVER copy this to docker-compose.production.yml.
    command: >
      postgres
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
    environment:
      POSTGRES_DB: qualis
      POSTGRES_USER: qualis
      POSTGRES_PASSWORD: qualis
    volumes:
      # postgres:18 moved PGDATA to /var/lib/postgresql/18/docker and the image
      # VOLUME to /var/lib/postgresql. Mounting the old .../data path against an
      # 18 image would leave the real data directory outside the volume, so it
      # would vanish on `docker compose down` — silently, with no error.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualis"]
      interval: 5s
      timeout: 3s
      retries: 5
      # Probe once a second while starting up: `interval` alone applies during
      # boot too, so a service ready after 300ms still waited a full 5s to be
      # noticed — repeated down a 4-service dependency chain. Requires Docker
      # Engine 25+; older daemons ignore the key.
      start_interval: 1s
      start_period: 30s

  # Object storage for audio responses. The default demo seeds spoken audio
  # comments, which need an S3-compatible store. MinIO is reached internally by
  # the backend at http://minio:9000 and served to the browser at
  # http://localhost:9000 (see S3_PUBLIC_ENDPOINT_URL on the backend).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qualis
      MINIO_ROOT_PASSWORD: qualis-demo-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_interval: 1s
      start_period: 30s

  # One-shot: create the audio bucket, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set demo http://minio:9000 qualis qualis-demo-secret &&
      mc mb --ignore-existing demo/qualis-audio &&
      echo 'Bucket qualis-audio ready';
      "

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://qualis:qualis@db:5432/qualis
      SECRET_KEY: docker-dev-secret-change-in-production
      IP_HASH_SALT: docker-dev-salt-change-in-production
      FRONTEND_URL: http://localhost:3000
      ENVIRONMENT: development
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
      # Audio storage (MinIO). Backend uploads via the internal endpoint;
      # presigned playback URLs are signed for the browser-facing endpoint.
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET_NAME: qualis-audio
      S3_ACCESS_KEY_ID: qualis
      S3_SECRET_ACCESS_KEY: qualis-demo-secret
      S3_REGION: us-east-1
      S3_ADDRESSING_STYLE: path
      # A local Postgres allows 100 connections; the conservative defaults
      # (sized for managed sandbox plans) would queue every concurrent request
      # behind a handful of connections.
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "10"
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      # Use the baked venv directly; a bare `uv run` here would also trigger a
      # dev re-sync on the first probe (see backend/Dockerfile CMD).
      test:
        [
          "CMD-SHELL",
          ".venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_interval: 1s
      # On a cold first start the backend runs Alembic migrations before serving
      # /health, which can exceed the retry window (12 x 5s). During
      # start_period, failing probes do NOT mark the container unhealthy, so
      # `make demo-up` no longer aborts the frontend on slow first boots. A
      # probe that succeeds earlier flips the container healthy immediately.
      # (The image no longer runs `uv sync` at container start — the CMD calls
      # the baked venv directly — so this window no longer covers a dependency
      # download.)
      start_period: 120s

  frontend:
    build: ./frontend
    environment:
      QUALIS_ALLOWED_HOST_PATTERN: "^(qualis[.]example[.]org|localhost|127[.]0[.]0[.]1)$"
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Compose only reports `make demo-up` as ready once both nginx and the
      # proxied backend health endpoint answer through the public port.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/health"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_interval: 1s
      start_period: 10s

volumes:
  pgdata:
  miniodata:
