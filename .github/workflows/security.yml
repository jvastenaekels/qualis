name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-security:
    name: Backend Security (SAST/SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run Bandit (SAST)
        # Scan 'backend/app' recursively, report high/medium confidence/severity
        run: |
          bandit -r backend/app -ll

      - name: Run pip-audit (SCA)
        # Scan environment for known vulnerabilities
        run: |
          pip-audit

  frontend-security:
    name: Frontend Security (SCA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (SCA)
        # Fail on high severity or higher
        run: npm audit --audit-level=high
