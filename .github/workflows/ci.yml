# GitHub Actions pinning policy:
#   * First-party actions (actions/*, github/*) may stay version-tagged.
#   * Third-party actions are pinned by 40-char commit SHA with the tag in a
#     trailing comment for human review.
# Regression test: backend/tests/security/wave_6/test_supply_chain_pinning.py.
name: Qualis CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  documentation-check:
    name: Documentation Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker (Lychee)
        uses: lycheeverse/lychee-action@22134d37a1fff6c2974df9c92a7c7e1e86a08f9c # v1.9.0
        with:
          args: --verbose --no-progress --config ./lychee.toml './docs/**/*.md' './README.md'
          fail: true

  backend-lint:
    name: Backend Lint & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Install dependencies
        run: cd backend && uv sync
      - name: Lint & Format (Ruff)
        run: |
          cd backend
          uv run ruff check app
          uv run ruff format --check app
      - name: Type Check (Mypy)
        run: cd backend && uv run mypy app
      - name: Security SAST (Bandit)
        run: cd backend && uv run bandit -r app -ll
      - name: Security SCA (Pip Audit)
        # Ignore list mirrors backend Makefile; rationale in SECURITY.md.
        run: |
          cd backend && uv run pip-audit \
            --ignore-vuln GHSA-wj6h-64fc-37mp \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2026-28684 \
            --ignore-vuln CVE-2026-25645
      - name: Complexity (Radon)
        run: cd backend && uv run radon cc app -a -nb --min B
      - name: Architecture (Import Linter)
        run: cd backend && uv run lint-imports
      - name: Dependency Hygiene (Deptry)
        run: cd backend && uv run deptry app
      - name: Dead Code (Vulture)
        run: cd backend && uv run vulture app vulture_whitelist.py --min-confidence 60
      - name: Dependency Sync (requirements.txt ↔ uv.lock)
        # backend/requirements.txt is a generated `uv export` of uv.lock that the
        # Scalingo buildpack installs with pip. Dependabot edits it directly; a lone
        # transitive bump can desync the pin set (e.g. pydantic-core vs pydantic),
        # breaking the buildpack install while CI stays green. Assert the lock matches
        # pyproject and the export matches the lock.
        run: |
          cd backend
          uv lock --check
          uv export --no-hashes --format requirements-txt --output-file requirements.txt
          git diff --exit-code requirements.txt

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qualis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qualis_test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Install dependencies
        run: cd backend && uv sync
      - name: Unit Tests (Pytest)
        # -n auto disabled in CI: parallel workers race on CREATE TYPE for
        # the same enum (UniqueViolationError on pg_type_typname_nsp_index).
        # Local dev still uses -n auto via Makefile; the safety margin in CI
        # is not worth the wall-clock saving.
        run: cd backend && uv run pytest tests

  docker-stack:
    name: Docker Images & Compose Stack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Nothing else in CI builds an image or starts Compose: the other jobs run
    # the code straight on the runner, against a `services:` PostgreSQL. That
    # left the Dockerfiles, the compose files and the nginx config completely
    # unexercised — a broken base image, a bad healthcheck or a mount pointing
    # at the wrong path would ship green. This job runs the same three targets
    # a contributor runs locally, so the demo path is covered by the same
    # commands the docs tell people to type.
    steps:
      - uses: actions/checkout@v4

      - name: Docker environment
        # start_interval in the healthchecks needs Engine 25+; older daemons
        # ignore the key silently, so record what we actually got.
        run: |
          docker version --format 'Engine: {{.Server.Version}}'
          docker compose version
          docker buildx version

      - name: Build and start the stack
        run: make demo-up

      - name: Assert the images carry the expected runtimes
        # These are the two version bumps most likely to be reverted by an
        # unrelated edit to a base image tag, and both are invisible to every
        # other job.
        run: |
          set -e
          python_version=$(docker compose exec -T backend .venv/bin/python -c \
            'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          echo "backend Python: $python_version"
          [ "$python_version" = "3.14" ] || { echo "expected Python 3.14"; exit 1; }

          pg_major=$(docker compose exec -T db postgres --version | grep -oE '[0-9]+' | head -1)
          echo "db PostgreSQL: $pg_major"
          [ "$pg_major" = "18" ] || { echo "expected PostgreSQL 18"; exit 1; }

      - name: Seed the demo dataset
        run: make demo-seed

      - name: Smoke-test through the public port
        # Goes through nginx, so it also covers the SPA fallback, the /health
        # proxy and the /api proxy — none of which the E2E suite touches, since
        # Playwright points at the Vite dev server.
        run: make demo-smoke

      - name: Assert nginx compresses and caches assets
        # Regression guard for frontend/nginx.conf: the upstream image ships
        # gzip off, and a hashed asset served without a long max-age costs a
        # revalidation round-trip on every page load.
        run: |
          set -e
          asset=$(curl -fsS http://localhost:3000/ \
            | grep -oE '/assets/[^"]+\.js' | head -1)
          echo "probing $asset"
          # GET, not HEAD: nginx has no body to compress on a HEAD, so it
          # would answer without Content-Encoding and fail this check falsely.
          headers=$(curl -fsS -o /dev/null -D - \
            -H 'Accept-Encoding: gzip' "http://localhost:3000$asset")
          echo "$headers"
          echo "$headers" | grep -qi '^content-encoding: gzip' \
            || { echo "asset not gzipped"; exit 1; }
          echo "$headers" | grep -qi 'cache-control:.*immutable' \
            || { echo "hashed asset not immutably cached"; exit 1; }

      - name: Container logs on failure
        if: failure()
        run: docker compose logs --tail 200

      - name: Tear down
        if: always()
        run: docker compose down --volumes

  frontend-lint:
    name: Frontend Lint & Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint & Format (Biome)
        run: npm run lint
      - name: Architecture (Dependency Cruiser)
        run: npm run lint:architecture
      - name: Type Check (TSC)
        run: npm run type-check
      - name: Duplication (JSCPD)
        run: npm install -g jscpd && npm run lint:duplication
      - name: Dead Code (Knip)
        run: npm run lint:deadcode
      - name: Security SCA (NPM Audit)
        # xlsx CVEs are accepted: SheetJS Community has no fix and Qualis only
        # WRITES XLSX (analysisXlsxExport.ts), never parses untrusted input.
        # See SECURITY.md ("xlsx (SheetJS Community Edition)") for full rationale.
        # Fail only on high+ advisories outside the allowlist.
        run: |
          set -e
          accepted='GHSA-4r6h-8v6p-xvw6|GHSA-5pgg-2g8v-p4x9'
          audit_json=$(npm audit --json) || true
          unknown=$(echo "$audit_json" | jq -r --arg a "$accepted" '
            [.vulnerabilities | to_entries[].value
             | select(.severity == "high" or .severity == "critical")
             | .via[] | objects
             | select((.url // "") | test($a) | not)
             | .url] | unique | join("\n")
          ')
          if [ -n "$unknown" ]; then
            echo "Unhandled high/critical advisories:"
            echo "$unknown"
            exit 1
          fi
          echo "All high+ advisories are within the SECURITY.md allowlist."
      - name: Localization Check (i18n)
        run: npm run i18n-check
      - name: API Sync Check
        run: npm run check:api

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit Tests (Vitest)
        run: npm run test -- --run --coverage

  e2e-study:
    name: E2E Tests (Study)
    needs: [backend-lint, frontend-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qualis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qualis
      ENVIRONMENT: test
      IP_HASH_SALT: ci-deterministic-salt-not-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Setup Backend
        env:
          UV_NO_PROGRESS: "1"
        run: |
          cd backend
          uv sync -v
          uv run -v python init_db.py --reset

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e 'console.log(require("./frontend/package-lock.json").packages["node_modules/@playwright/test"].version)')" >> $GITHUB_ENV

      - name: Cache Playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-all-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright OS dependencies
        run: cd frontend && npx playwright install-deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run Study E2E tests
        run: cd frontend && npm run test:e2e:study
        env:
          CI: true
          API_BASE_URL: http://127.0.0.1:8000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-study
          path: frontend/playwright-report/
          retention-days: 7

  e2e-admin:
    name: E2E Tests (Admin)
    needs: [backend-lint, frontend-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qualis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qualis
      ENVIRONMENT: test
      IP_HASH_SALT: ci-deterministic-salt-not-secret
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Setup Backend
        env:
          UV_NO_PROGRESS: "1"
        run: |
          cd backend
          uv sync -v
          uv run -v python init_db.py --reset

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e 'console.log(require("./frontend/package-lock.json").packages["node_modules/@playwright/test"].version)')" >> $GITHUB_ENV

      - name: Cache Playwright binaries
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-all-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright OS dependencies
        run: cd frontend && npx playwright install-deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run Admin E2E tests
        run: cd frontend && npm run test:e2e:admin
        env:
          CI: true
          API_BASE_URL: http://127.0.0.1:8000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-admin
          path: frontend/playwright-report/
          retention-days: 7
