name: Open-Q CI

on:
  workflow_dispatch:
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  documentation-check:
    name: Documentation Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker (Lychee)
        uses: lycheeverse/lychee-action@v1.9.0
        with:
          args: --verbose --no-progress './docs/**/*.md' './README.md'
          fail: true

  backend-lint:
    name: Backend Lint & Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: cd backend && uv sync
      - name: Lint & Format (Ruff)
        run: |
          cd backend
          uv run ruff check app
          uv run ruff format --check app
      - name: Type Check (Mypy)
        run: cd backend && uv run mypy app
      - name: Security SAST (Bandit)
        run: cd backend && uv run bandit -r app -ll
      - name: Security SCA (Pip Audit)
        run: cd backend && uv run pip-audit --ignore-vuln GHSA-wj6h-64fc-37mp
      - name: Complexity (Radon)
        run: cd backend && uv run radon cc app -a -nb --min B
      - name: Architecture (Import Linter)
        run: cd backend && uv run lint-imports
      - name: Dependency Hygiene (Deptry)
        run: cd backend && uv run deptry app
      - name: Dead Code (Vulture)
        run: cd backend && uv run vulture app vulture_whitelist.py --min-confidence 60

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - name: Install dependencies
        run: cd backend && uv sync
      - name: Unit Tests (Pytest)
        run: cd backend && uv run pytest -n auto tests

  frontend-lint:
    name: Frontend Lint & Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint & Format (Biome)
        run: npm run lint
      - name: Architecture (Dependency Cruiser)
        run: npm run lint:architecture
      - name: Type Check (TSC)
        run: npm run type-check
      - name: Duplication (JSCPD)
        run: npm install -g jscpd && npm run lint:duplication
      - name: Dead Code (Knip)
        run: npm run lint:deadcode
      - name: Security SCA (NPM Audit)
        run: npm audit --audit-level=high
      - name: Localization Check (i18n)
        run: npm run i18n-check
      - name: API Sync Check
        run: npm run check:api

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit Tests (Vitest)
        run: npm run test -- --run --coverage

  e2e-study:
    name: E2E Tests (Study)
    needs: [backend-lint, frontend-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Setup Backend
        env:
          UV_NO_PROGRESS: "1"
        run: |
          cd backend
          uv sync -v
          uv run -v python init_db.py --reset

      - name: Start Backend
        run: |
          cd backend
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          # Wait for backend to be ready with a slightly more robust check
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/health > /dev/null; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend ($i/30)..."
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Seed Database
        env:
          API_BASE_URL: http://127.0.0.1:8000
        run: |
          cd backend
          uv run python seed.py data/example-study.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e 'console.log(require("./frontend/package-lock.json").packages["node_modules/@playwright/test"].version)')" >> $GITHUB_ENV

      - name: Cache Playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-all-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright OS dependencies
        run: cd frontend && npx playwright install-deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run Study E2E tests
        run: cd frontend && npm run test:e2e:study
        env:
          CI: true
          API_BASE_URL: http://127.0.0.1:8000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-study
          path: frontend/playwright-report/
          retention-days: 7

  e2e-admin:
    name: E2E Tests (Admin)
    needs: [backend-lint, frontend-lint]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Setup Backend
        env:
          UV_NO_PROGRESS: "1"
        run: |
          cd backend
          uv sync -v
          uv run -v python init_db.py --reset

      - name: Start Backend
        run: |
          cd backend
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/health > /dev/null; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Waiting for backend ($i/30)..."
            sleep 2
          done
          exit 1

      - name: Seed Database
        env:
          API_BASE_URL: http://127.0.0.1:8000
        run: |
          cd backend
          uv run python seed.py data/example-study.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Get installed Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(node -e 'console.log(require("./frontend/package-lock.json").packages["node_modules/@playwright/test"].version)')" >> $GITHUB_ENV

      - name: Cache Playwright binaries
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-all-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - name: Install Playwright OS dependencies
        run: cd frontend && npx playwright install-deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run Admin E2E tests
        run: cd frontend && npm run test:e2e:admin
        env:
          CI: true
          API_BASE_URL: http://127.0.0.1:8000

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-admin
          path: frontend/playwright-report/
          retention-days: 7
