# Dependabot config — weekly security & version updates (Wave 6 Task 10).
#
# Closes the Wave 6 spec item: "Dependabot / Renovate config presence."
#
# Three ecosystems:
#   * pip — reads backend/pyproject.toml. Qualis uses `uv` not pip
#     directly; Dependabot's pip ecosystem still parses pyproject.toml
#     for direct dependencies and proposes minor / patch upgrades.
#     Lockfile (uv.lock) is regenerated locally during PR review.
#   * npm — frontend/package-lock.json is the source of truth.
#   * github-actions — pinning policy keeps third-party actions on
#     SHAs (see ci.yml header); Dependabot proposes SHA + comment-tag
#     updates as the upstream releases new versions.
#
# Pull requests are opened in batches; the audit workflow gates merges.
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    # `mando` is a transitive dependency pulled in only by `radon`.
    # radon 6.0.1 (latest) hard-caps it at `mando<0.8`, so a Dependabot
    # bump to mando>=0.8 produces an unsolvable pip resolution and breaks
    # the Scalingo deploy (PR #132 did exactly this). Its version is
    # dictated by radon — never bump it independently.
    ignore:
      - dependency-name: "mando"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    # Major bumps for these are breaking-API migrations, not routine
    # upgrades — their auto-PRs failed CI and were closed (PRs #130,
    # #136, #137, #138). Block the major line so Dependabot stops
    # recreating them; minor/patch still flow. Remove the relevant
    # entry when doing the dedicated migration for that package.
    ignore:
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zustand"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-zoom-pan-pinch"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
