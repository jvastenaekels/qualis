repos:
  # -------------------------
  # GENERIC QUALITY CHECKS
  # -------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
        exclude: ^frontend/tsconfig.*\.json$

  # -------------------------
  # BACKEND (Python/FastAPI)
  # -------------------------
  # Ruff : Linter/Formatter (Aligné sur la version récente)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Mypy : Static Type Checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/
        args:
          ["--config-file=backend/pyproject.toml", "--ignore-missing-imports"]
        additional_dependencies:
          [
            types-requests,
            pydantic,
            fastapi,
            sqlalchemy,
            pydantic-settings,
            slowapi,
            httpx,
            pytest,
          ]

  # Sécurité & Hygiène (Local System Hooks)
  - repo: local
    hooks:
      # Radon : Complexity
      - id: radon-cc
        name: Radon (Complexity)
        entry: radon cc
        language: system
        args: ["-a", "-nb", "--min", "B"]
        files: ^backend/
        types: [python]

      # Deptry : Dependency Hygiene
      - id: deptry
        name: Deptry (Check Dependencies)
        entry: bash -c 'cd backend && deptry app'
        language: system
        files: ^backend/pyproject.toml|backend/.*\.py$
        pass_filenames: false

      # Bandit : Security SAST
      - id: bandit
        name: Bandit (Security)
        entry: bandit
        language: system
        args: ["-r", "backend/app", "-ll"]
        files: ^backend/
        pass_filenames: false

  # -------------------------
  # FRONTEND (React/TypeScript)
  # -------------------------
  - repo: local
    hooks:
      # TypeScript Check
      - id: frontend-typecheck
        name: Frontend Typecheck (TSC)
        entry: bash -c 'cd frontend && npm run type-check'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      # Linting & Formatting (Biome)
      - id: frontend-biome
        name: Frontend Lint & Format (Biome)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: false

      # Architecture/Dead Code
      - id: frontend-knip
        name: Frontend Dead Code (Knip)
        entry: bash -c 'cd frontend && npm run lint:deadcode'
        language: system
        files: ^frontend/
        pass_filenames: false
