server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # F-02-007 — Reject requests with unexpected Host header (host-header
    # injection mitigation). The default allowlist covers the canonical
    # production domain and local-dev hostnames; self-hosters must edit
    # this regex to match their own deployment domains. The 444 status
    # is nginx-specific (close connection without response) — the
    # documented response for malicious host probes.
    if ($host !~ ^(qualis\.example\.org|localhost|127\.0\.0\.1)$) {
        return 444;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
