[tool.ruff]
# Target Python version
target-version = "py310"
line-length = 88
extend-exclude = ["backend/vulture_whitelist.py"]

[tool.ruff.lint]
# E = pycodestyle (PEP 8 - Errors)
# W = pycodestyle (PEP 8 - Warnings)
# F = Pyflakes (Logical errors)
# I = Isort (Import sorting)
# D = Pydocstyle (PEP 257 - Docstrings)
# UP = Pyupgrade (Auto modernization)
select = ["E", "W", "F", "I", "D", "UP"]

# Ignore conflicting or too noisy rules
ignore = [
    "D104", # Missing docstring in public package
    "E501", # Line too long
]

[tool.ruff.lint.pydocstyle]
# Use "google" convention for clarity
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D103"]
"scripts/*" = ["E402"]
"backend/scripts/*" = ["E402"]
"update_study.py" = ["E402"]
"backend/update_study.py" = ["E402"]
"backend/vulture_whitelist.py" = ["F821", "D100"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["vulture_whitelist\\.py"]

[tool.radon]
exclude = "tests/*,venv/*"
cc_min = "B"
