[project]
name = "open-q-backend"
version = "0.1.0"
description = "Backend for Open-Q"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]>=0.128.0,<0.129.0",
    "asyncpg==0.31.0",
    "pydantic==2.12.5",
    "sqlalchemy[asyncio]==2.0.45",
    "pydantic-settings>=2.6.0",
    "aiofiles>=24.1.0",
    "slowapi>=0.1.9",
    "bcrypt>=4.1.0",
    "gunicorn>=23.0.0",
    "pyjwt>=2.9.0",
    "httpx>=0.27.0",
    "starlette>=0.40.0",
    "pyotp>=2.9.0",
    "alembic>=1.18.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "pytest-xdist>=3.5.0",
    "ruff>=0.8.0",
    "mypy>=1.0.0",
    "bandit>=1.7.0",
    "pip-audit>=2.7.0",
    "radon>=6.0.0",
    "vulture>=2.11",
    "import-linter>=2.0",
    "deptry>=0.20.0",
    "pre-commit>=4.0.0",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = "test_*.py"

[tool.ruff]
target-version = "py313"

[tool.deptry]
known_first_party = ["app"]

[tool.deptry.per_rule_ignores]
DEP002 = ["asyncpg", "alembic", "aiofiles", "gunicorn", "uvicorn", "python-multipart"]

[tool.importlinter]
root_package = "app"

[[tool.importlinter.contracts]]
name = "Three tier architecture"
type = "layers"
layers = [
    "app.routers",
    "app.services",
    "app.models"
]
