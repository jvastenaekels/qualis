[tool.ruff]
# Target Python version
target-version = "py310"
line-length = 88
extend-exclude = ["backend/vulture_whitelist.py", "backend/venv", ".venv", "venv"]

[tool.ruff.lint]
# E = pycodestyle (PEP 8 - Errors)
# W = pycodestyle (PEP 8 - Warnings)
# F = Pyflakes (Logical errors)
# I = Isort (Import sorting)
# D = Pydocstyle (PEP 257 - Docstrings)
# UP = Pyupgrade (Auto modernization)
select = ["E", "W", "F", "I", "D", "UP"]

# Ignore conflicting or too noisy rules
ignore = [
    "D104", # Missing docstring in public package
    "E501", # Line too long
]

[tool.ruff.lint.pydocstyle]
# Use "google" convention for clarity
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["D103"]
"scripts/*" = ["E402"]
"backend/scripts/*" = ["E402"]
"update_study.py" = ["E402"]
"backend/update_study.py" = ["E402"]
"backend/vulture_whitelist.py" = ["F821", "D100"]
"vulture_whitelist.py" = ["F821", "D100"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
explicit_package_bases = true
namespace_packages = true
exclude = ["vulture_whitelist\\.py", "venv", "\\.venv"]

[tool.radon]
exclude = "tests/*,venv/*"
cc_min = "B"

[tool.pytest.ini_options]
addopts = "--cov=app --cov-report=term-missing --cov-report=html"
testpaths = ["tests"]
python_files = ["test_*.py"]
pythonpath = "."
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
concurrency = ["thread", "greenlet"]
source = ["app"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80

[tool.deptry]
ignore_notebooks = true
requirements_txt = ["requirements.txt", "requirements-dev.txt"]

[tool.deptry.per_rule_ignores]
DEP001 = ["app"]
DEP002 = [
    "uvicorn",
    "gunicorn",
    "aiosqlite",
    "asyncpg",
    "passlib",
    "email-validator",
    "python-multipart",
    "pydantic-settings",
    "aiofiles",
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "bandit",
    "pre-commit",
    "pip-audit",
    "mypy",
    "radon",
    "vulture",
    "import-linter",
    "deptry",
    "ruff",
    "bcrypt",
    "types-python-jose",
    "types-passlib"
]
DEP003 = ["httpx"]
